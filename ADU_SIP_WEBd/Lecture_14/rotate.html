<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container{
            perspective: 100px;
        }

        .box{
            width: 200px;
            height: 200px;
            background-color: purple;

            transition: 1s;
        }

        .box:hover{
            transform: translateZ(100px);
        }

</head>
