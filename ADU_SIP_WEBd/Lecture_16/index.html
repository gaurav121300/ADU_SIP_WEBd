<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Position Properties</title>
    <style>
        *{
            margin: 0;
            padding: 0;
        }

       .box{
        height: 233px;
        width: 80vw;
        padding: 3px;
        margin: 3px;
        border: 2px solid black;
       }

       .box1{
        background-color: aquamarine;
        position: relative;
        top: 50px;
        left: 50px;
       
        height: 200px;
        width: 80vw;
        /* position: absolute;
        top: 0px;
        left: 100px; */
       }

       .box2{
        background-color: blue;
         /* position: sticky;
        top: 0px;
        left: 250px; */
        /* position: relative;
        top: 50px;
        left: 120px; */
       }

       .box3{
        background-color: burlywood;
        /* position: fixed;
        bottom: 0px;
        left: 120px; */

       }

       .box4{
        background-color: darkmagenta;
       }

       .parent{
        padding: 43px;
        margin: 34px;
        border: 3px solid purple;
        position: absolute;

       }
    </style>
</head>
<body>
   <div class="parent">
    <div class="box box1"></div>
    <div class="box box2"></div>
    <div class="box box3"></div>
    <div class="box box4"></div>
   </div>
</body>
</html>
